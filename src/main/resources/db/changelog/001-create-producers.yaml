databaseChangeLog:
  - changeSet:
      id: 001-create-producers
      author: igor
      changes:
        - createTable:
            tableName: producers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_producers
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: country
                  type: VARCHAR(255)

              - column:
                  name: description
                  type: VARCHAR(1000)

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false