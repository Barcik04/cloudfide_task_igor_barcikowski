databaseChangeLog:
  - changeSet:
      id: 003-create-product-attributes
      author: igor
      changes:
        - createTable:
            tableName: product_attributes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_product_attributes
                    nullable: false

              - column:
                  name: attribute_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: attribute_value
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: product_attributes
            baseColumnNames: product_id
            constraintName: product_attribute_product_id_fk
            referencedTableName: products
            referencedColumnNames: id